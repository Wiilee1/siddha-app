<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Siddha - Gamified Meditation</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Inter:wght@400;500;600&family=Lora:wght@400;500;600&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Icons (Google Material Symbols) -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />

    <!-- Styles -->
    <link rel="stylesheet" href="./src/styles/variables.css">
    <link rel="stylesheet" href="./src/styles/components.css">
    <link rel="stylesheet" href="./src/styles/main.css">
</head>
<body>
    <script>
        if (localStorage.getItem('theme_choice') === 'cosmic') {
            document.body.classList.add('theme-cosmic');
        }
    </script>
    <div id="app" class="app-container">
        <!-- Main Content Area -->
        <main id="screen-container">
            <!-- Screens will be injected here by main.js -->
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <button class="nav-item active" data-target="home">
                <span class="material-symbols-rounded">home</span>
                <span class="nav-label">Home</span>
            </button>
            <button class="nav-item" data-target="journey">
                <span class="material-symbols-rounded">map</span>
                <span class="nav-label">Journey</span>
            </button>
            <button class="nav-item nav-fab" data-target="breathe">
                <div class="fab-circle">
                    <span class="material-symbols-rounded">self_improvement</span>
                </div>
                <span class="nav-label">Meditate</span>
            </button>
            <button class="nav-item" data-target="reflect">
                <span class="material-symbols-rounded">sentiment_satisfied</span>
                <span class="nav-label">Reflect</span>
            </button>
            <button class="nav-item" data-target="profile">
                <span class="material-symbols-rounded">person</span>
                <span class="nav-label">Profile</span>
            </button>
        </nav>
    </div>

    <!-- Scripts -->
    <script type="module" src="./src/main.js"></script>
    <!-- Auto-redirect to local HTTP server if file:// is opened -->
    <script>
        if (window.location.protocol === 'file:') {
            window.location.href = 'http://localhost:8000';
        }
    </script>
</body>
</html>
