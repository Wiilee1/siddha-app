<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Siddha - Gamified Meditation</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Inter:wght@400;500;600&family=Lora:wght@400;500;600&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Icons (Google Material Symbols) -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />

    <!-- Styles -->
    <link rel="stylesheet" href="./src/styles/variables.css">
    <link rel="stylesheet" href="./src/styles/components.css">
    <link rel="stylesheet" href="./src/styles/main.css">
</head>
<body>
    <script>
        if (localStorage.getItem('theme_choice') === 'cosmic') {
            document.body.classList.add('theme-cosmic');
        }
    </script>
    <div id="app" class="app-container">
        <!-- Main Content Area -->
        <main id="screen-container">
            <!-- Screens will be injected here by main.js -->
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <button class="nav-item active" data-target="home">
                <span class="material-symbols-rounded">home</span>
                <span class="nav-label">Home</span>
            </button>
            <button class="nav-item" data-target="journey">
                <span class="material-symbols-rounded">map</span>
                <span class="nav-label">Journey</span>
            </button>
            <button class="nav-item nav-fab" data-target="breathe">
                <div class="fab-circle">
                    <span class="material-symbols-rounded">self_improvement</span>
                </div>
                <span class="nav-label">Meditate</span>
            </button>
            <button class="nav-item" data-target="reflect">
                <span class="material-symbols-rounded">sentiment_satisfied</span>
                <span class="nav-label">Reflect</span>
            </button>
            <button class="nav-item" data-target="profile">
                <span class="material-symbols-rounded">person</span>
                <span class="nav-label">Profile</span>
            </button>
        </nav>
    </div>

    <!-- Scripts -->
    <script type="module" src="./src/main.js"></script>
    <script>
        // Fallback check to detect CORS issues when opening index.html directly via file://
        window.addEventListener('load', () => {
            setTimeout(() => {
                if (window.location.protocol === 'file:') {
                    const screenContainer = document.getElementById('screen-container');
                    if (screenContainer && screenContainer.children.length === 0) {
                    screenContainer.innerHTML = `
                        <div style="padding: var(--spacing-lg); text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh;">
                            <span class="material-symbols-rounded" style="font-size: 64px; color: #d32f2f; margin-bottom: 16px;">error</span>
                            <h2 style="margin-bottom: 12px; font-size: 20px;">Local Server Required</h2>
                            <p class="text-sm" style="margin-bottom: 24px; line-height: 1.6;">
                                Browsers block modular JavaScript when opening HTML files directly (via <strong>file://</strong>). 
                                <br><br>
                                Please run a local server to view the app.
                            </p>
                            <div class="card" style="background: #FFF; border: 1px solid var(--color-bg-secondary); width: 100%; text-align: left;">
                                <p class="text-sm" style="font-family: monospace; font-size: 11px; margin-bottom: 8px;">Run this command in terminal:</p>
                                <code style="font-family: monospace; font-size: 12px; display: block; background: var(--color-bg-secondary); padding: 8px; border-radius: 4px; word-break: break-all;">cd "siddha-app" && python3 -m http.server 8000</code>
                                <p class="text-sm" style="font-family: monospace; font-size: 11px; margin-top: 12px; margin-bottom: 8px;">Then open this link:</p>
                                <a href="http://localhost:8000" target="_blank" style="font-family: monospace; font-size: 12px; color: var(--color-accent-dark); text-decoration: underline;">http://localhost:8000</a>
                            </div>
                        </div>
                    `;
                    document.querySelector('.bottom-nav').style.display = 'none';
                    }
                }
            }, 1000);
        });
    </script>
</body>
</html>
